name: "LuminaOS - Cloud ISO Build"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_iso:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Install Nix"
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-24.05

      - name: "Setup NixOS and Build ISO"
        run: |
          nix-channel --add https://nixos.org/channels/nixos-24.05 nixos
          nix-channel --update
          nix-shell -p nixos-generators --run "nixos-generate -f install-iso -c nixos/iso.nix -I nixpkgs=channel:nixos-24.05 -o result/LuminaOS-v1.0.iso"

      - name: "Upload ISO Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: LuminaOS-v1.0-ISO
          path: result/LuminaOS-v1.0.iso
          if-no-files-found: error
